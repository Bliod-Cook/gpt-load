name: CI Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Build Frontend
        working-directory: ./web
        env:
          VITE_VERSION: ${{ github.ref_name }}
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Run Go Tests
        run: go test $(go list ./... | grep -v '^gpt-load/web/node_modules/')

      - name: Build Backend
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X gpt-load/internal/version.Version=${{ github.ref_name }}" -o dist/gpt-load-linux-amd64 .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpt-load-linux-amd64-${{ github.sha }}
          path: dist/gpt-load-linux-amd64
          if-no-files-found: error
